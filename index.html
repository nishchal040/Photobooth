<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chewy&family=Comic+Relief:wght@400;700&family=Courgette&family=Grand+Hotel&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <title>Photobooth</title>
</head>
<body>
    <div class="main">
        <h1>Photobooth</h1>
    <div id="filters">
        <button data-filter="none">Normal</button>
        <button data-filter="grayscale(1)">B&W</button>
        <button data-filter="sepia(1)">Vintage</button>
        <button data-filter="contrast(1.5)">High Contrast</button>
        <button data-filter="brightness(1.2)">Bright</button>
        
    </div>
    <div class="container">
        <img src="flipcamera.png" alt="">
        <div id="photos"></div>

         <div class="preview">
            <video id="camera" autoplay playsinline></video>
            <div class="btns">
                <div class="flip-btn">↺</div>
                <button id="snap">Cheese!</button>
                <button id="download">Download</button>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
